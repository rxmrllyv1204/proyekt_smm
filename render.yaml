services:
  # 1. Backend + Frontend (Web Service)
  - type: web
    name: smm-panel-app
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn -w 4 -k uvicorn.workers.UvicornWorker main:app
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: smm-db
          property: connectionString
      - key: SMTP_EMAIL
        sync: false # Buni Render dashboardda qo'lda kiritasiz (xavfsizlik uchun)
      - key: SMTP_PASSWORD
        sync: false # Buni Render dashboardda qo'lda kiritasiz (xavfsizlik uchun)

databases:
  # 2. PostgreSQL Ma'lumotlar bazasi
  - name: smm-db
    plan: free
    region: frankfurt
